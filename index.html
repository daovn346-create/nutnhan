<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Single Joystick (Smooth)</title>

<script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>

<style>
body {
    background:#0a0a0a;
    color:white;
    text-align:center;
    font-family:Arial;
}

canvas{
    background:#111;
    border-radius:50%;
    margin-top:30px;
}

.btn{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:20px;
    font-weight:bold;
    cursor:pointer;
}

.auto{background:green;}
.manual{background:red;}

</style>
</head>

<body>

<h2>Single Joystick Control</h2>

<button class="btn auto" id="btnAuto">AUTO</button>
<button class="btn manual" id="btnManual">MANUAL</button>

<canvas id="joystick" width="250" height="250"></canvas>

<script>
const eraWidget = new EraWidget();
let actions=[];

eraWidget.init({
    needActions:true,
    onConfiguration:(config)=>{
        actions=config.actions;
    }
});

// ===== NÚT =====
document.getElementById("btnAuto").onclick=()=>{
    if(actions[0]) eraWidget.triggerAction(actions[0].action);
}

document.getElementById("btnManual").onclick=()=>{
    if(actions[1]) eraWidget.triggerAction(actions[1].action);
}

// ===== CONFIG =====
const DEADZONE = 5;
const MAX = 90;
const SMOOTH = 0.2;
const SEND_RATE = 50;

// ===== JOYSTICK =====
let canvas=document.getElementById("joystick");
let ctx=canvas.getContext("2d");

let cx=125, cy=125, r=90;
let x=cx, y=cy, active=false;

let vx=0, vy=0;
let targetX=0, targetY=0;
let lastSend=0;

function draw(){
    ctx.clearRect(0,0,250,250);

    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle="#444";
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(x,y,35,0,Math.PI*2);
    ctx.fillStyle="cyan";
    ctx.fill();
}

function loop(){
    vx += (targetX - vx) * SMOOTH;
    vy += (targetY - vy) * SMOOTH;

    let sendX = Math.abs(vx) < DEADZONE ? 0 : vx;
    let sendY = Math.abs(vy) < DEADZONE ? 0 : vy;

    let now = Date.now();
    if(now - lastSend > SEND_RATE){
        // gửi cả 2 giá trị (x,y)
        if(actions[2]){
            eraWidget.triggerAction(actions[2].action, JSON.stringify({
                x: Math.round(sendX),
                y: Math.round(-sendY)
            }));
        }
        lastSend = now;
    }

    requestAnimationFrame(loop);
}

canvas.onmousedown=()=>active=true;
window.onmouseup=()=>{
    active=false;
    targetX=0; targetY=0;
    x=cx; y=cy;
    draw();
}

window.onmousemove=(e)=>{
    if(!active) return;

    let rect=canvas.getBoundingClientRect();
    let dx=e.clientX-rect.left-cx;
    let dy=e.clientY-rect.top-cy;

    let dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>MAX){ dx*=MAX/dist; dy*=MAX/dist; }

    x=cx+dx;
    y=cy+dy;
    draw();

    targetX=dx;
    targetY=dy;
}

draw();
loop();

</script>

</body>
</html>
